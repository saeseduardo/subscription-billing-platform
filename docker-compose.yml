services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-app
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
    depends_on:
      - mysql
      - redis
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: billing
      DB_USERNAME: billing
      DB_PASSWORD: secret
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis

  nginx:
    image: nginx:1.27-alpine
    container_name: billing-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-queue
    command: php artisan queue:work redis --tries=3 --backoff=30
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
    depends_on:
      - app
      - redis
      - mysql

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billing-scheduler
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - vendor-data:/var/www/html/vendor
    depends_on:
      - app
      - mysql
      - redis

  mysql:
    image: mysql:8.4
    container_name: billing-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: billing
      MYSQL_USER: billing
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: billing-redis
    ports:
      - "6379:6379"

volumes:
  mysql-data:
  vendor-data:
